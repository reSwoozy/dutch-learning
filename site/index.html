<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0f1a">
  <meta name="description" content="Курс нидерландского A1-B2 с грамматикой, карточками и тестами.">
  <title>Dutch Learning System</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="#home" class="logo">
        <span>NL</span> Dutch Learning
      </a>
      <button type="button" class="nav-burger" id="nav-burger" aria-label="Открыть меню" aria-expanded="false" aria-controls="nav-drawer">
        <span></span><span></span><span></span>
      </button>
      <nav id="nav-drawer" class="nav-drawer" aria-label="Основная навигация">
        <div class="nav-main">
          <a href="#lessons" class="nav-link">Уроки</a>
          <a href="#grammar" class="nav-link">Грамматика</a>
          <a href="#flashcards" class="nav-link">Карточки</a>
          <a href="#tests" class="nav-link">Тесты</a>
          <details class="nav-group" id="nav-materials">
            <summary class="nav-link nav-group__trigger">
              Материалы
              <svg class="nav-group__chevron" viewBox="0 0 12 12" width="12" height="12" aria-hidden="true">
                <path d="M2 4l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </summary>
            <div class="nav-submenu">
              <a href="#verbs" class="nav-link">Глаголы</a>
              <a href="#reading" class="nav-link">Чтение</a>
              <a href="#writing" class="nav-link">Письмо</a>
              <a href="#culture" class="nav-link">Культура</a>
              <a href="#resources" class="nav-link">Ресурсы</a>
            </div>
          </details>
        </div>
        <div class="nav-actions">
          <a href="#" id="nav-search" class="nav-search-btn" title="Поиск (Ctrl/Cmd+K)">
            <svg class="nav-search-btn__icon" viewBox="0 0 20 20" width="16" height="16" aria-hidden="true">
              <circle cx="9" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
              <path d="M14 14l4 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span>Поиск</span>
            <kbd>⌘K</kbd>
          </a>
          <a href="#progress" id="nav-progress" class="nav-progress" title="Мой прогресс">
            <span class="nav-progress__avatar" aria-hidden="true">
              <svg viewBox="0 0 20 20" width="16" height="16">
                <circle cx="10" cy="7" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M3.5 16.5c1-3 3.6-4.6 6.5-4.6s5.5 1.6 6.5 4.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="nav-progress__label">Прогресс</span>
            <span class="nav-progress__streak" id="nav-progress-streak" hidden>
              <svg viewBox="0 0 14 16" width="11" height="12" aria-hidden="true">
                <path d="M7 1s3 3.2 3 6.2a3 3 0 1 1-6 0c0-1.1.4-2 1-2.8C6 6.4 7 8 7 8s-.5-4 0-7z" fill="currentColor"/>
              </svg>
              <span id="nav-progress-streak-value">0</span>
            </span>
          </a>
        </div>
      </nav>
      <div class="nav-scrim" id="nav-scrim" hidden></div>
    </div>
  </header>

  <main class="container">
    <div id="main-content"></div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div class="site-footer-brand">
        <span class="logo-mark">NL</span>
        <span>Dutch Learning System</span>
      </div>
      <div class="site-footer-meta">
        A1 — B2 · Inburgering · Staatsexamen NT2 II · <span id="footer-year"></span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    (function () {
      var yearEl = document.getElementById('footer-year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();
      if (!('serviceWorker' in navigator)) return;

      var reloadedOnce = false;
      navigator.serviceWorker.addEventListener('message', function (event) {
        if (event && event.data && event.data.type === 'dutch-sw-activated' && !reloadedOnce) {
          reloadedOnce = true;
          location.reload();
        }
      });

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    })();
  </script>
</body>
</html>
