name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate JSON data
        run: |
          set -e
          mapfile -t files < <(find site/data -name '*.json')
          for f in "${files[@]}"; do
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$f" \
              || { echo "::error file=$f::Invalid JSON"; exit 1; }
          done

      - name: Rebuild vocabulary indexes
        run: node scripts/rebuild-vocab-index.mjs

      - name: Inject Firebase config
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          set -e
          cp site/js/firebase/config.example.js site/js/firebase/config.js
          sed -i \
            -e "s|__FB_API_KEY__|${FB_API_KEY}|" \
            -e "s|__FB_AUTH_DOMAIN__|${FB_AUTH_DOMAIN}|" \
            -e "s|__FB_PROJECT_ID__|${FB_PROJECT_ID}|" \
            -e "s|__FB_STORAGE_BUCKET__|${FB_STORAGE_BUCKET}|" \
            -e "s|__FB_MESSAGING_SENDER_ID__|${FB_MESSAGING_SENDER_ID}|" \
            -e "s|__FB_APP_ID__|${FB_APP_ID}|" \
            site/js/firebase/config.js

      - name: Guard against missing secrets
        run: |
          if grep -q '__FB_' site/js/firebase/config.js; then
            echo "::error::Placeholder __FB_*__ still present in site/js/firebase/config.js — check GitHub Secrets"
            exit 1
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
