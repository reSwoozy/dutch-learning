name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate JSON data
        run: |
          set -e
          mapfile -t files < <(find site/data -name '*.json')
          for f in "${files[@]}"; do
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$f" \
              || { echo "::error file=$f::Invalid JSON"; exit 1; }
          done

      - name: Rebuild vocabulary indexes
        run: node scripts/rebuild-vocab-index.mjs

      - name: Inject Firebase config
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const clean = (v) =>
            (v ?? '').trim().replace(/^["'`]|["'`]$/g, '');
          const cfg = {
            apiKey: clean(process.env.FB_API_KEY),
            authDomain: clean(process.env.FB_AUTH_DOMAIN),
            projectId: clean(process.env.FB_PROJECT_ID),
            storageBucket: clean(process.env.FB_STORAGE_BUCKET),
            messagingSenderId: clean(process.env.FB_MESSAGING_SENDER_ID),
            appId: clean(process.env.FB_APP_ID),
          };
          const missing = Object.entries(cfg)
            .filter(([, v]) => !v)
            .map(([k]) => k);
          if (missing.length) {
            console.error(
              '::error::Missing or empty Firebase secrets: ' + missing.join(', '),
            );
            process.exit(1);
          }
          const body =
            'export const firebaseConfig = ' +
            JSON.stringify(cfg, null, 2) +
            ';\n';
          fs.writeFileSync('site/js/firebase/config.js', body);
          EOF

      - name: Validate generated config.js
        run: node --check site/js/firebase/config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
